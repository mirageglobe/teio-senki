# Grid: x 0–19 (west → east), y 0–14 (south → north)
# Terrain: plain | mountain | forest | river | coast | pass | marsh | hills | steppe
# Faction: starting controller at scenario open (190 AD — Dong Zhuo Chaos)
#
# Four Economic Pillars (1–100):
#   agriculture  Wood   Grain output; army upkeep. Blue Chip — slow, steady, essential.
#   commerce     Metal  Gold flow; recruitment & trade. Liquidity — high-velocity cash.
#   technology   Fire   Multiplier on Ag/Com yield. Innovation — enhances other assets.
#   order        Earth  Reduces corruption/riots. The Moat — protects intrinsic value.

